<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Monitor | 登录 / Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./monitor.css?v=20260309m3" />
    <script defer src="./monitor.js?v=20260309dt9"></script>
  </head>
  <body data-page="login">
    <main class="hero">
      <section class="content">
        <button id="lang-toggle" class="btn ghost lang-toggle login-lang" type="button">EN</button>
        <span class="brand-tag">NEXO MACRO INTELLIGENCE</span>
        <h1 class="slogan" data-i18n="login_title">Nexo Monitor Console</h1>
        <p class="sub" data-i18n="login_sub">运维、业务与数据表单分析</p>
        <div class="human-check">
          <label id="human-question" for="human-answer" data-i18n="human_question">人类验证</label>
          <div class="human-row">
            <input id="human-answer" type="text" data-i18n-placeholder="human_placeholder" placeholder="请输入答案" autocomplete="off" />
            <button id="human-verify" class="btn ghost" type="button" data-i18n="human_verify">验证</button>
          </div>
        </div>
        <button id="google-login" class="btn" disabled data-i18n="login_google">Google 登录</button>
        <p id="login-status" class="subtle-note"></p>
      </section>
    </main>
  </body>
</html>
