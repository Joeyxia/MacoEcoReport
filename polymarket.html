<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polymarket 量化交易系统 · MVP</title>
  <link rel="stylesheet" href="/styles.css?v=poly1" />
  <style>
    .pm-wrap { max-width: 1080px; margin: 0 auto; padding: 18px 16px 80px; }
    .pm-grid { display: grid; gap: 12px; grid-template-columns: repeat(12, minmax(0, 1fr)); }
    .pm-card { grid-column: span 12; background: #fff; border: 1px solid rgba(10,40,40,.12); border-radius: 14px; padding: 14px; }
    .pm-card.half { grid-column: span 6; }
    .pm-title { font-size: 22px; font-weight: 700; margin: 0 0 8px; color:#102a33; }
    .pm-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin: 8px 0; }
    .pm-input { border:1px solid rgba(10,40,40,.25); border-radius: 10px; padding:10px 12px; min-width: 240px; font-size: 14px; }
    .pm-btn { border:1px solid #0b8170; background:#0b8170; color:#fff; border-radius: 10px; padding:10px 14px; font-weight: 600; cursor:pointer; }
    .pm-btn.ghost { background:#fff; color:#0b8170; }
    .pm-table { width:100%; border-collapse: collapse; font-size: 13px; }
    .pm-table th, .pm-table td { border-bottom:1px solid rgba(10,40,40,.12); padding:8px; text-align:left; vertical-align: top; }
    .pm-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; white-space: pre-wrap; color:#425a62; }
    .pm-pill { display:inline-block; border-radius:999px; padding:3px 10px; background:#e8f7f4; color:#0b8170; font-weight:700; font-size:12px; }
    .pm-toast { margin: 10px 0 14px; border-radius: 10px; padding: 10px 12px; font-size: 14px; border:1px solid rgba(10,40,40,.14); background:#f5fbfa; color:#20505a; display:none; }
    .pm-toast.ok { display:block; border-color:rgba(12,130,96,.28); background:#eef9f5; color:#0b6f55; }
    .pm-toast.err { display:block; border-color:rgba(176,40,40,.28); background:#fff4f4; color:#a13030; }
    .pm-toast.info { display:block; border-color:rgba(10,40,40,.2); background:#f5f7f8; color:#35515a; }
    .pm-kv { display:grid; grid-template-columns: 180px 1fr; row-gap:8px; column-gap:10px; font-size:14px; color:#1f3d46; margin: 8px 0; }
    .pm-k { color:#51707a; }
    .pm-v { font-weight:600; }
    .pm-tag { display:inline-block; border-radius:999px; padding:2px 8px; font-size:12px; border:1px solid rgba(10,40,40,.16); }
    .pm-tag.on { color:#0b6f55; border-color:rgba(12,130,96,.35); background:#eef9f5; }
    .pm-tag.off { color:#7a3d3d; border-color:rgba(176,40,40,.28); background:#fff4f4; }
    details.pm-raw { margin-top:8px; }
    details.pm-raw > summary { cursor:pointer; color:#4c636b; font-size:13px; }
    @media (max-width: 900px){ .pm-card.half { grid-column: span 12; } .pm-input { min-width: 100%; } }
  </style>
</head>
<body>
  <main class="pm-wrap">
    <h1 class="pm-title">Polymarket 量化交易系统（MVP）</h1>
    <p style="color:#4c636b;margin-top:0;">已实现：市场/盘口接入、套利扫描、VWAP仿真、账户接入、自动交易开关、风险总览、模拟执行与审计留痕。</p>
    <div id="actionToast" class="pm-toast info">准备就绪。</div>

    <section class="pm-grid">
      <div class="pm-card half">
        <h2 class="pm-title" style="font-size:18px;">账户接入</h2>
        <div id="currentUser" class="pm-mono" style="margin-bottom:8px;"></div>
        <div class="pm-row">
          <input id="signer" class="pm-input" placeholder="signer address (0x...)" />
          <input id="funder" class="pm-input" placeholder="funder address (可留空)" />
        </div>
        <div class="pm-row">
          <button class="pm-btn" id="btnConnect">连接账户</button>
          <button class="pm-btn ghost" id="btnDerive">派生凭证</button>
          <button class="pm-btn ghost" id="btnEnable">开启自动交易</button>
          <button class="pm-btn ghost" id="btnDisable">关闭自动交易</button>
        </div>
        <div id="accountStatusSummary" class="pm-kv"></div>
        <details class="pm-raw">
          <summary>查看原始返回（JSON）</summary>
          <div id="accountStatus" class="pm-mono"></div>
        </details>
      </div>

      <div class="pm-card half">
        <h2 class="pm-title" style="font-size:18px;">风控与执行</h2>
        <div class="pm-row">
          <button class="pm-btn" id="btnRisk">查看风险总览</button>
          <button class="pm-btn ghost" id="btnCancelAll">紧急撤单</button>
          <button class="pm-btn ghost" id="btnReplay">执行复盘摘要</button>
        </div>
        <div id="riskOut" class="pm-mono"></div>
      </div>

      <div class="pm-card">
        <h2 class="pm-title" style="font-size:18px;">套利机会扫描</h2>
        <div class="pm-row">
          <button class="pm-btn" id="btnSeed">初始化 Demo 市场</button>
          <button class="pm-btn" id="btnScan">扫描机会</button>
        </div>
        <table class="pm-table" id="oppTable">
          <thead>
            <tr>
              <th>ID</th><th>Market</th><th>Type</th><th>Theory</th><th>VWAP</th><th>Conf</th><th>Source</th><th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    let accountId = "";
    let currentUserEmail = "";

    async function jfetch(url, opt){
      const r = await fetch(url, opt || {});
      const d = await r.json().catch(()=>({ok:false,error:"bad_json"}));
      if(!r.ok || d.ok===false){ throw new Error(d.detail || d.error || ("http_"+r.status)); }
      return d;
    }

    function setText(id, obj){ document.getElementById(id).textContent = JSON.stringify(obj, null, 2); }
    function nowStr(){ return new Date().toLocaleString(); }
    function toast(msg, type){
      const el = document.getElementById("actionToast");
      el.className = `pm-toast ${type || "info"}`;
      el.textContent = `[${nowStr()}] ${msg}`;
    }
    function setBusy(btn, busy, labelBusy){
      if(!btn) return;
      if(busy){
        btn.dataset._txt = btn.textContent;
        btn.textContent = labelBusy || "处理中...";
        btn.disabled = true;
        btn.style.opacity = "0.7";
      } else {
        btn.textContent = btn.dataset._txt || btn.textContent;
        btn.disabled = false;
        btn.style.opacity = "1";
      }
    }
    function ynTag(v){
      const on = !!v;
      const cls = on ? "on" : "off";
      const txt = on ? "是" : "否";
      return `<span class="pm-tag ${cls}">${txt}</span>`;
    }
    function fmtNum(v){
      const n = Number(v || 0);
      return Number.isFinite(n) ? n.toLocaleString() : "--";
    }
    function renderAccountSummary(d){
      const sum = document.getElementById("accountStatusSummary");
      const bal = (d.balances && d.balances[0]) || {};
      const connected = d?.approvals?.wallet_connected;
      const creds = d?.approvals?.credentials_active;
      const auto = Number(d?.limits?.auto_trading || 0) === 1;
      const signer = d?.account?.signer_address || "--";
      const funder = d?.account?.funder_address || "--";
      const signerMatch = d?.health?.signer_match;
      sum.innerHTML = `
        <div class="pm-k">账户 ID</div><div class="pm-v">${d.account_id || "--"}</div>
        <div class="pm-k">Signer</div><div class="pm-v">${signer}</div>
        <div class="pm-k">Funder</div><div class="pm-v">${funder}</div>
        <div class="pm-k">钱包已连接</div><div class="pm-v">${ynTag(connected)}</div>
        <div class="pm-k">凭证已激活</div><div class="pm-v">${ynTag(creds)}</div>
        <div class="pm-k">自动交易</div><div class="pm-v">${ynTag(auto)}</div>
        <div class="pm-k">签名地址匹配</div><div class="pm-v">${signerMatch === undefined ? "--" : ynTag(!!signerMatch)}</div>
        <div class="pm-k">可用余额</div><div class="pm-v">${fmtNum(bal.available_balance)} ${bal.asset_symbol || "USDC"}</div>
        <div class="pm-k">账户状态</div><div class="pm-v">${d?.health?.account_status || "--"}</div>
        <div class="pm-k">同步延迟</div><div class="pm-v">${d?.health?.sync_delay_sec ?? "--"} 秒</div>
      `;
    }

    async function refreshAccount(){
      if(!accountId) return;
      const d = await jfetch(`/api/v1/accounts/polymarket/status?account_id=${encodeURIComponent(accountId)}`);
      renderAccountSummary(d);
      setText("accountStatus", d);
      return d;
    }

    async function bootstrapUserAndAccount(){
      try{
        const me = await jfetch("/api/auth/me");
        currentUserEmail = String(me?.user?.email || "").trim().toLowerCase();
        document.getElementById("currentUser").textContent = currentUserEmail ? `当前登录邮箱：${currentUserEmail}` : "";
      }catch(_e){
        currentUserEmail = "";
      }
      try{
        const out = await jfetch("/api/v1/accounts/polymarket/list");
        if(Array.isArray(out.items) && out.items.length){
          accountId = String(out.items[0].id || "");
          await refreshAccount();
          toast(`已加载当前用户账户：${accountId}`, "ok");
        } else {
          toast("当前登录邮箱尚未绑定 Polymarket 账户，请先连接账户。", "info");
        }
      }catch(e){
        if(String(e.message || "") === "account_not_found"){
          toast("当前登录邮箱尚未绑定 Polymarket 账户，请先连接账户。", "info");
        } else {
          toast(`读取账户列表失败：${e.message}`, "err");
        }
      }
    }

    async function scan(){
      const d = await jfetch("/api/v1/opportunities/scan?limit=30");
      const tb = document.querySelector("#oppTable tbody");
      tb.innerHTML = "";
      for(const x of (d.items||[])){
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><span class="pm-pill">${x.id}</span></td>
          <td>${x.market_title || x.market_id}</td>
          <td>${x.strategy_type}</td>
          <td>${Number(x.theory_profit||0).toFixed(4)}</td>
          <td>${Number(x.vwap_profit||0).toFixed(4)}</td>
          <td>${Number(x.confidence||0).toFixed(2)}</td>
          <td>${x.source || "--"}</td>
          <td><button class="pm-btn ghost" data-id="${x.id}">执行</button></td>
        `;
        tb.appendChild(tr);
      }
      tb.querySelectorAll("button[data-id]").forEach((b)=>{
        b.onclick = async ()=>{
          try{
            if(!accountId){ alert("请先连接账户并开启自动交易"); return; }
            const out = await jfetch(`/api/v1/opportunities/${encodeURIComponent(b.dataset.id)}/execute`, {
              method:"POST",
              headers:{"Content-Type":"application/json"},
              body: JSON.stringify({account_id: accountId, actor: "web-demo"})
            });
            alert(`执行成功: ${out.execution_id || ""} (mode=${out.mode || "unknown"}, status=${out.status || "-"})`);
            await document.getElementById("btnRisk").click();
          }catch(e){ alert("执行失败: " + e.message); }
        };
      });
    }

    document.getElementById("btnSeed").onclick = async ()=>{
      const btn = document.getElementById("btnSeed");
      try{
        setBusy(btn, true);
        toast("正在初始化 Demo 市场...", "info");
        const out = await jfetch("/api/v1/system/seed-demo");
        toast(`初始化完成，共 ${Number(out.count || 0)} 个市场`, "ok");
      }catch(e){ toast(`初始化失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnScan").onclick = async ()=>{
      const btn = document.getElementById("btnScan");
      try{
        setBusy(btn, true);
        toast("正在扫描套利机会...", "info");
        await scan();
        toast("扫描完成，已刷新机会列表", "ok");
      }catch(e){ toast(`扫描失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnConnect").onclick = async ()=>{
      const btn = document.getElementById("btnConnect");
      try{
        setBusy(btn, true);
        toast("正在连接账户...", "info");
        const signer = document.getElementById("signer").value.trim();
        if(!signer) throw new Error("请先输入 signer address");
        const funder = document.getElementById("funder").value.trim() || signer;
        const out = await jfetch("/api/v1/accounts/polymarket/connect", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ account_type:"wallet", signer_address: signer, funder_address: funder, signature_type:"eoa" })
        });
        accountId = out.account_id || "";
        const status = await refreshAccount();
        toast(`连接成功：${accountId}（钱包连接=${status?.approvals?.wallet_connected ? "是" : "否"}）`, "ok");
      }catch(e){ toast("连接失败: " + e.message, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnDerive").onclick = async ()=>{
      const btn = document.getElementById("btnDerive");
      try{
        setBusy(btn, true);
        if(!accountId) throw new Error("请先连接账户");
        toast("正在派生交易凭证...", "info");
        await jfetch("/api/v1/accounts/polymarket/derive-credentials",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({account_id:accountId})});
        const status = await refreshAccount();
        toast(`派生凭证完成（凭证激活=${status?.approvals?.credentials_active ? "是" : "否"}）`, "ok");
      }catch(e){ toast(`派生凭证失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnEnable").onclick = async ()=>{
      const btn = document.getElementById("btnEnable");
      try{
        setBusy(btn, true);
        if(!accountId) throw new Error("请先连接账户");
        toast("正在开启自动交易...", "info");
        await jfetch("/api/v1/accounts/polymarket/enable-auto-trading",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({account_id:accountId})});
        const status = await refreshAccount();
        toast(`自动交易已开启（当前=${Number(status?.limits?.auto_trading||0)===1 ? "开启" : "关闭"}）`, "ok");
      }catch(e){ toast(`开启自动交易失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnDisable").onclick = async ()=>{
      const btn = document.getElementById("btnDisable");
      try{
        setBusy(btn, true);
        if(!accountId) throw new Error("请先连接账户");
        toast("正在关闭自动交易...", "info");
        await jfetch("/api/v1/accounts/polymarket/disable-auto-trading",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({account_id:accountId})});
        const status = await refreshAccount();
        toast(`自动交易已关闭（当前=${Number(status?.limits?.auto_trading||0)===1 ? "开启" : "关闭"}）`, "ok");
      }catch(e){ toast(`关闭自动交易失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnCancelAll").onclick = async ()=>{
      const btn = document.getElementById("btnCancelAll");
      try{
        setBusy(btn, true);
        if(!accountId) throw new Error("请先连接账户");
        toast("正在执行紧急撤单...", "info");
        const out=await jfetch("/api/v1/accounts/polymarket/emergency-cancel-all",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({account_id:accountId})});
        setText("riskOut", out);
        toast(`紧急撤单完成，撤销 ${Number(out.cancelled || 0)} 笔`, "ok");
      }catch(e){ toast(`紧急撤单失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnRisk").onclick = async ()=>{
      const btn = document.getElementById("btnRisk");
      try{
        setBusy(btn, true);
        toast("正在加载风险总览...", "info");
        const q=accountId?`?account_id=${encodeURIComponent(accountId)}`:"";
        setText("riskOut", await jfetch("/api/v1/risk/overview"+q));
        toast("风险总览已刷新", "ok");
      }catch(e){ toast(`读取风险总览失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    document.getElementById("btnReplay").onclick = async ()=>{
      const btn = document.getElementById("btnReplay");
      try{
        setBusy(btn, true);
        toast("正在加载执行复盘...", "info");
        setText("riskOut", await jfetch("/api/v1/replay/summary?days=7"));
        toast("执行复盘摘要已刷新", "ok");
      }catch(e){ toast(`读取执行复盘失败：${e.message}`, "err"); }
      finally{ setBusy(btn, false); }
    };
    bootstrapUserAndAccount();
  </script>
  <script src="/auth-guard.js?v=20260318pm1"></script>
</body>
</html>
