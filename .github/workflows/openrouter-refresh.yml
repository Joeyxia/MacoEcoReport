name: OpenRouter Rankings Refresh

on:
  schedule:
    - cron: "0 4 * * *" # 12:00 China time (UTC+8), starts from next run window
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-openrouter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Refresh OpenRouter rankings to DB
        run: python scripts/refresh_openrouter_rankings.py

      - name: Commit and push DB changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/macro_monitor.db
          if git diff --cached --quiet; then
            echo "No DB changes to commit"
          else
            git commit -m "Auto refresh OpenRouter rankings snapshot"
            git push
          fi
