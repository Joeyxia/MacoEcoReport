<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <noscript><meta http-equiv="refresh" content="0; url=/register.html" /></noscript>
    <title>Nexo · Routing</title>
    <style>
      html, body {
        margin: 0;
        height: 100vh;
        background: #0a0d14;
        color: #5d6878;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stub { font-size: 12px; letter-spacing: 0.5px; opacity: 0.6; }
    </style>
  </head>
  <body>
    <div class="stub" id="stub">Nexo · Routing…</div>
    <script>
      (function () {
        var isZh = /^zh/i.test(navigator.language || "");
        var stub = document.getElementById("stub");
        if (stub) stub.textContent = isZh ? "Nexo · 跳转中…" : "Nexo · Routing…";
        document.title = isZh ? "Nexo · 跳转中" : "Nexo · Routing";
        document.documentElement.lang = isZh ? "zh-CN" : "en";

        var TIMEOUT_MS = 5000;
        function go(url) { location.replace(url); }

        var probe = fetch("/api/auth/me", { credentials: "include", cache: "no-store" })
          .then(function (r) {
            if (!r.ok) return { authenticated: false };
            return r.json().catch(function () { return { authenticated: false }; });
          })
          .then(function (d) { return !!(d && d.authenticated); });

        var timer = new Promise(function (_resolve, reject) {
          setTimeout(function () { reject(new Error("timeout")); }, TIMEOUT_MS);
        });

        Promise.race([probe, timer])
          .then(function (auth) { go(auth ? "/dashboard.html" : "/register.html"); })
          .catch(function () { go("/register.html"); });
      })();
    </script>
  </body>
</html>
