<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Monitor | 数据生成工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./monitor.css?v=20260310m6" />
    <script defer src="./monitor.js?v=20260310dt13"></script>
  </head>
  <body data-page="data-tool">
    <div class="bg-layer"></div>
    <header class="site-header">
      <a class="brand" href="./dashboard.html">Nexo Monitor</a>
      <nav>
        <a href="./dashboard.html" class="nav-link" data-i18n="nav_ops">运维看板</a>
        <a href="./subscribers.html" class="nav-link" data-i18n="nav_business">业务运营</a>
        <a href="./invites.html" class="nav-link">邀请码</a>
        <a href="./stock-data-admin.html" class="nav-link">股票数据</a>
        <a href="./data-tool.html" class="nav-link active" data-i18n="nav_tool">数据生成工具</a>
        <a href="./forms.html" class="nav-link" data-i18n="nav_forms">数据表单</a>
      </nav>
      <div class="userbox"><span id="user-email"></span><button id="logout-btn" class="btn ghost" data-i18n="logout">退出</button></div>
      <button id="lang-toggle" class="btn ghost lang-toggle" type="button">EN</button>
    </header>

    <main class="page page-report wrap">
      <section class="panel">
        <div class="report-actions">
          <button id="generate-report" class="btn" data-i18n="tool_regen">重新生成草稿</button>
          <button id="finalize-report" class="btn" data-i18n="tool_finalize">生成最终报告</button>
          <button id="save-report" class="btn ghost" data-i18n="tool_save">保存</button>
          <button id="download-report" class="btn ghost" data-i18n="tool_download">下载 .txt</button>
          <label class="subtle check-row" for="run-online-check">
            <input id="run-online-check" type="checkbox" checked />
            <span data-i18n="tool_run_check">生成最终报告前执行在线数据校验</span>
          </label>
          <span id="save-status" class="subtle"></span>
        </div>
        <textarea id="report-editor" class="report-editor" spellcheck="false"></textarea>
      </section>

      <section class="grid two">
        <article class="panel">
          <h2 data-i18n="tool_archive_title">每日报告归档</h2>
          <p class="subtle" data-i18n="tool_archive_desc">每个保存日期都提供直接访问链接。</p>
          <div id="report-links" class="report-links report-list"></div>
        </article>
        <article class="panel">
          <h2 data-i18n="tool_check_title">在线数据校验结果</h2>
          <div id="online-check-table" class="table-wrap"></div>
        </article>
      </section>

      <section class="panel">
        <h2 data-i18n="tool_indicator_verification">指标在线校验状态</h2>
        <div id="indicator-verification-table" class="table-wrap explorer"></div>
      </section>
    </main>
  </body>
</html>
