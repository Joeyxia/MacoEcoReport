<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Monitor | 数据生成工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./monitor.css" />
    <script defer src="./monitor.js?v=20260309dt2"></script>
  </head>
  <body data-page="data-tool">
    <div class="bg-layer"></div>
    <header class="site-header">
      <a class="brand" href="./dashboard.html">Nexo Monitor</a>
      <nav>
        <a href="./dashboard.html" class="nav-link">Ops Dashboard</a>
        <a href="./subscribers.html" class="nav-link">Business</a>
        <a href="./data-tool.html" class="nav-link active">数据生成工具</a>
        <a href="./forms.html" class="nav-link">Data Forms</a>
      </nav>
      <div class="userbox"><span id="user-email"></span><button id="logout-btn" class="btn ghost">Logout</button></div>
    </header>

    <main class="page wrap">
      <section class="panel">
        <h2>数据生成工具</h2>
        <div class="tool-actions">
          <button id="tool-generate-report" class="btn">重新生成草稿</button>
          <button id="tool-finalize-report" class="btn">生成最终报告</button>
          <button id="tool-save-report" class="btn ghost">保存</button>
          <button id="tool-download-report" class="btn ghost">下载 .txt</button>
          <label class="muted check-inline" for="tool-run-online-check">
            <input id="tool-run-online-check" type="checkbox" checked />
            <span>生成最终报告前执行在线数据校验</span>
          </label>
          <span id="tool-save-status" class="muted"></span>
        </div>
        <textarea id="tool-report-editor" class="tool-editor" spellcheck="false"></textarea>
      </section>

      <section class="panel">
        <h2>在线数据校验结果</h2>
        <div id="tool-online-check-table"></div>
      </section>
    </main>
  </body>
</html>
