<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Monitor | Polymarket 风控配置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./monitor.css?v=20260317pm1" />
    <script defer src="./monitor.js?v=20260317pm1"></script>
  </head>
  <body data-page="polymarket-risk">
    <div class="bg-layer"></div>
    <header class="site-header">
      <a class="brand" href="./dashboard.html">Nexo Monitor</a>
      <nav>
        <a href="./dashboard.html" class="nav-link" data-i18n="nav_ops">运维看板</a>
        <a href="./subscribers.html" class="nav-link" data-i18n="nav_business">业务运营</a>
        <a href="./invites.html" class="nav-link">邀请码</a>
        <a href="./stock-data-admin.html" class="nav-link">股票数据</a>
        <a href="./polymarket-risk.html" class="nav-link active" data-i18n="nav_polymarket_risk">Polymarket 风控</a>
        <a href="./data-tool.html" class="nav-link" data-i18n="nav_tool">数据生成工具</a>
        <a href="./forms.html" class="nav-link" data-i18n="nav_forms">数据表单</a>
      </nav>
      <div class="userbox"><span id="user-email"></span><button id="logout-btn" class="btn ghost" data-i18n="logout">退出</button></div>
      <button id="lang-toggle" class="btn ghost lang-toggle" type="button">EN</button>
    </header>

    <main class="page wrap">
      <section class="panel">
        <h2 data-i18n="pm_risk_title">Polymarket 风控模板配置</h2>
        <div class="pm-risk-actions">
          <label for="pm-account" data-i18n="pm_account">账户</label>
          <select id="pm-account"></select>
          <button class="btn ghost" id="pm-load" data-i18n="pm_load">加载当前配置</button>
          <button class="btn ghost" id="pm-template" data-i18n="pm_use_template">使用默认模板</button>
          <button class="btn" id="pm-save" data-i18n="pm_save">保存配置</button>
        </div>
        <p class="muted" id="pm-risk-status"></p>

        <div class="pm-risk-grid">
          <label>max_daily_notional <input id="pm-max-daily-notional" type="number" step="0.01" /></label>
          <label>max_order_notional <input id="pm-max-order-notional" type="number" step="0.01" /></label>
          <label>max_market_exposure <input id="pm-max-market-exposure" type="number" step="0.01" /></label>
          <label>max_slippage_bps <input id="pm-max-slippage-bps" type="number" step="0.01" /></label>
          <label>max_open_orders <input id="pm-max-open-orders" type="number" step="1" /></label>
          <label>min_expected_edge_bps <input id="pm-min-expected-edge-bps" type="number" step="0.01" /></label>
          <label>min_model_confidence <input id="pm-min-model-confidence" type="number" step="0.01" min="0" max="1" /></label>
          <label>min_orderbook_depth <input id="pm-min-orderbook-depth" type="number" step="0.01" /></label>
          <label>order_cooldown_sec <input id="pm-order-cooldown-sec" type="number" step="1" /></label>
          <label>max_daily_realized_loss <input id="pm-max-daily-loss" type="number" step="0.01" /></label>
          <label>max_consecutive_failed_orders <input id="pm-max-consecutive-failed" type="number" step="1" /></label>
          <label>max_reject_ratio_pct_10m <input id="pm-max-reject-ratio" type="number" step="0.01" min="0" max="100" /></label>
          <label>default_order_type
            <select id="pm-default-order-type">
              <option value="GTC">GTC</option>
              <option value="IOC">IOC</option>
              <option value="FOK">FOK</option>
            </select>
          </label>
          <label>cancel_stale_after_sec <input id="pm-cancel-stale-after-sec" type="number" step="1" /></label>
        </div>

        <div class="pm-risk-checks">
          <label><input id="pm-auto-trading" type="checkbox" /> auto_trading</label>
          <label><input id="pm-halt-api-degraded" type="checkbox" /> halt_on_api_degraded</label>
          <label><input id="pm-post-only" type="checkbox" /> post_only</label>
          <label><input id="pm-allow-taker" type="checkbox" /> allow_taker</label>
          <label><input id="pm-paper-mode" type="checkbox" /> paper_mode</label>
        </div>
      </section>
    </main>
  </body>
</html>
