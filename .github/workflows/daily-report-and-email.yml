name: Daily Report And Email

on:
  schedule:
    - cron: "0 0 * * *" # 08:00 China time (UTC+8), fetch-only warmup
    - cron: "0 1 * * *" # 09:00 China time (UTC+8)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process subscription requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/process_subscription_issues.py

      - name: Decide run mode by schedule
        id: plan
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "strict=1" >> "$GITHUB_OUTPUT"
            echo "send_email=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR_UTC="$(date -u +%H)"
          if [ "$HOUR_UTC" = "00" ]; then
            echo "mode=fetch-only" >> "$GITHUB_OUTPUT"
            echo "strict=0" >> "$GITHUB_OUTPUT"
            echo "send_email=0" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "strict=1" >> "$GITHUB_OUTPUT"
            echo "send_email=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh data and generate daily report
        id: refresh
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-5.4"
          OPENAI_STRICT_ANALYSIS: "true"
        run: |
          if [ "${{ steps.plan.outputs.strict }}" = "1" ]; then
            python scripts/daily_refresh.py --mode "${{ steps.plan.outputs.mode }}" --strict-freshness --require-openai-ai
          else
            python scripts/daily_refresh.py --mode "${{ steps.plan.outputs.mode }}"
          fi

      - name: Send daily emails
        if: steps.plan.outputs.send_email == '1'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          PAGES_BASE_URL: "https://nexo.hk"
          REFRESH_STATUS: ${{ steps.refresh.outcome }}
        run: python scripts/send_daily_emails.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model.xlsx data/latest_snapshot.json data_update_log.json reports/index.json data/subscribers.json data/macro_monitor.db
          git add reports/*.html reports/*.txt 2>/dev/null || true
          if [ -f data/email_dispatch_log.json ]; then
            git add data/email_dispatch_log.json
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update daily report and email dispatch"
            git push
          fi
