<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Monitor | 运维看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./monitor.css?v=20260310m6" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="./monitor.js?v=20260313dt14"></script>
  </head>
  <body data-page="ops">
    <div class="bg-layer"></div>
    <header class="site-header">
      <a class="brand" href="./dashboard.html">Nexo Monitor</a>
      <nav>
        <a href="./dashboard.html" class="nav-link active" data-i18n="nav_ops">运维看板</a>
        <a href="./subscribers.html" class="nav-link" data-i18n="nav_business">业务运营</a>
        <a href="./invites.html" class="nav-link">邀请码</a>
        <a href="./stock-data-admin.html" class="nav-link">股票数据</a>
        <a href="./data-tool.html" class="nav-link" data-i18n="nav_tool">数据生成工具</a>
        <a href="./forms.html" class="nav-link" data-i18n="nav_forms">数据表单</a>
      </nav>
      <div class="userbox"><span id="user-email"></span><button id="logout-btn" class="btn ghost" data-i18n="logout">退出</button></div>
      <button id="lang-toggle" class="btn ghost lang-toggle" type="button">EN</button>
    </header>
    <main class="page wrap">
      <section class="grid kpis">
        <article class="panel"><h3><span data-i18n="ops_page_visits">页面访问量</span> (<span id="ops-window-label">上线累计</span>)</h3><div id="kpi-visits" class="kpi">--</div></article>
        <article class="panel"><h3 data-i18n="ops_input_tokens">输入 Token</h3><div id="kpi-input" class="kpi">--</div></article>
        <article class="panel"><h3 data-i18n="ops_output_tokens">输出 Token</h3><div id="kpi-output" class="kpi">--</div></article>
        <article class="panel"><h3 data-i18n="ops_total_tokens">总 Token</h3><div id="kpi-total" class="kpi">--</div></article>
      </section>
      <section class="grid two">
        <article class="panel"><h3 data-i18n="ops_visits_by_minute">分钟级访问量</h3><canvas id="visits-chart"></canvas></article>
        <article class="panel"><h3 data-i18n="ops_tokens_by_minute">分钟级 Token 用量</h3><canvas id="tokens-chart"></canvas></article>
      </section>
      <section class="panel">
        <h3 data-i18n="ops_top_pages">热门页面</h3>
        <div id="top-pages"></div>
      </section>
    </main>
  </body>
</html>
