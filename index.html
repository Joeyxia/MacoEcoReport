<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexo Marco Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #070b13;
        --bg-2: #0f1828;
        --ink: #e8eef8;
        --soft: #93a7c3;
        --accent: #38d9ff;
        --line: rgba(148, 163, 184, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 20%, rgba(56, 217, 255, 0.14), transparent 40%),
          radial-gradient(circle at 85% 80%, rgba(56, 217, 255, 0.1), transparent 45%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.18;
        pointer-events: none;
        animation: gridDrift 28s linear infinite;
      }

      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        pointer-events: none;
        background:
          radial-gradient(circle at 20% 30%, rgba(56, 217, 255, 0.16), transparent 38%),
          radial-gradient(circle at 80% 70%, rgba(56, 217, 255, 0.14), transparent 40%);
        filter: blur(24px);
        animation: glowMove 16s ease-in-out infinite alternate;
      }

      .hero {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .content {
        max-width: 980px;
        text-align: center;
        animation: rise 0.7s ease-out both;
      }

      .brand {
        display: inline-block;
        margin-bottom: 22px;
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .slogan {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(26px, 4.9vw, 72px);
        line-height: 1.06;
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .sub {
        margin: 18px auto 34px;
        max-width: 620px;
        color: var(--soft);
        font-size: clamp(14px, 2vw, 18px);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 188px;
        height: 48px;
        border-radius: 999px;
        border: 1px solid rgba(56, 217, 255, 0.5);
        background: linear-gradient(120deg, rgba(56, 217, 255, 0.2), rgba(56, 217, 255, 0.08));
        color: #d9f7ff;
        font-weight: 600;
        text-decoration: none;
        backdrop-filter: blur(4px);
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 30px rgba(56, 217, 255, 0.25);
        background: linear-gradient(120deg, rgba(56, 217, 255, 0.28), rgba(56, 217, 255, 0.12));
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes glowMove {
        from {
          transform: translate3d(-1.2%, -1%, 0) scale(1);
          opacity: 0.82;
        }
        to {
          transform: translate3d(1.4%, 1.2%, 0) scale(1.06);
          opacity: 1;
        }
      }

      @keyframes gridDrift {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(42px);
        }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <section class="content">
        <span class="brand">Nexo Macro Intelligence</span>
        <h1 class="slogan">Signal Before the Storm</h1>
        <p class="sub">Track global macro risk with a 14-dimension monitoring model.</p>
        <a class="btn" href="dashboard.html">Enter Dashboard</a>
      </section>
    </main>
  </body>
</html>
