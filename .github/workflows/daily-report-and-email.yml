name: Daily Report And Email

on:
  schedule:
    - cron: "0 1 * * *" # 09:00 China time (UTC+8)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Process subscription requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/process_subscription_issues.py

      - name: Refresh data and generate daily report
        run: python scripts/daily_refresh.py

      - name: Send daily emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          PAGES_BASE_URL: "https://joeyxia.github.io/MacoEcoReport"
        run: python scripts/send_daily_emails.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model.xlsx data/latest_snapshot.json data_update_log.json reports/index.json reports/*.html reports/*.txt data/subscribers.json data/email_dispatch_log.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update daily report and email dispatch"
            git push
          fi
