    <div class="bg-layer"></div>
    <header class="site-header">
      <a class="brand" href="index.html">Macro Risk Monitor</a>
      <nav>
        <a class="nav-link" href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
        <a class="nav-link" href="daily-report.html" data-i18n="nav_daily_report">Daily Report</a>
        <a class="nav-link" href="indicators.html" data-i18n="nav_indicators">Indicators</a>
        <a class="nav-link" href="glossary.html" data-i18n="nav_glossary">Glossary</a>

            <button id="ai-query-submit" class="btn" type="button" data-i18n="ai_data_assistant_submit">Ask AI</button>

          <p id="ai-query-status" class="subtle ai-center-text"></p>

        </div>
      </section>
